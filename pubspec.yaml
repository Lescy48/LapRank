name: aras_laptop
description: "Sistem Pendukung Keputusan Rekomendasi Laptop menggunakan Metode ARAS"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  pdf: ^3.10.8
  printing: ^5.12.0
  csv: ^6.0.0
  path_provider: ^2.1.3
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/background/topography.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"